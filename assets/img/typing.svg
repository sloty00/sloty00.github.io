<svg xmlns="http://www.w3.org/2000/svg" width="600" height="70" viewBox="0 0 600 70">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500');
    
    .text-base {
      font-family: 'JetBrains Mono', monospace;
      font-size: 25px;
      fill: #334155;
      text-anchor: middle;
      dominant-baseline: middle;
      opacity: 0;
      animation: fadeInOut 12s infinite;
    }

    /* Animamos la opacidad de los textos en cadena */
    @keyframes fadeInOut {
      0%, 22% { opacity: 0; }
      25%, 47% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .t2 { animation-delay: 3s; }
    .t3 { animation-delay: 6s; }
    .t4 { animation-delay: 9s; }

    .cursor {
      fill: #3b82f6;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>

  <g transform="translate(300, 35)">
    <text x="0" y="0" class="text-base t1">Platform Engineer</text>
    <text x="0" y="0" class="text-base t2">FullStack Developer</text>
    <text x="0" y="0" class="text-base t3">DevSecOps Specialist</text>
    <text x="0" y="0" class="text-base t4">Infrastructure Architect</text>
    
    <rect x="160" y="-15" width="3" height="30" class="cursor" />
  </g>
</svg>
