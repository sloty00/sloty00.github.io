<svg xmlns="http://www.w3.org/2000/svg" width="600" height="70" viewBox="0 0 600 70">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500');
    
    .text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 25px;
      fill: #334155;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    @keyframes typing {
      0%, 100% { content: ""; }
      5%, 20% { content: "Platform Engineer"; }
      25% { content: ""; }
      30%, 45% { content: "FullStack Developer"; }
      50% { content: ""; }
      55%, 70% { content: "DevSecOps Specialist"; }
      75% { content: ""; }
      80%, 95% { content: "Infrastructure Architect"; }
    }

    .typing-content::after {
      content: "";
      animation: typing 16s infinite;
    }

    .cursor {
      animation: blink 0.8s infinite;
      fill: #3b82f6;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>

  <text x="300" y="35" class="text">
    <tspan class="typing-content"></tspan>
    <tspan class="cursor">|</tspan>
  </text>
</svg>
