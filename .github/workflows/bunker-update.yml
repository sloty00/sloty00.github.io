name: Actualizar Datos del Bunker
on:
  repository_dispatch:
    types: [update_json]
  workflow_dispatch: 

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Trae todo el historial para evitar conflictos de push

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Ejecutar script de actualización
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: python .github/scripts/update_manager.py

      - name: Commitear y subir cambios
        run: |
          git config --global user.name "Bunker Admin Bot"
          git config --global user.email "jvargas@gitadmin.cl"
          
          git add .
          
          # Mejora: Solo intentar commitear si hay cambios detectados
          if ! git diff --cached --quiet; then
            git commit -m "GitOps: [${{ github.event.client_payload.action || 'manual' }}] en ${{ github.event.client_payload.module || 'datos' }}"
            git push origin main
          else
            echo "No hay cambios detectados en el JSON. Saltando commit."
          fi
