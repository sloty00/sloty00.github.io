name: Actualizar Datos del Bunker
on:
  repository_dispatch:
    types: [update_json]
  workflow_dispatch: # <--- CRÍTICO: Esto habilita el botón manual en GitHub

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions: # <--- IMPORTANTE: Da permiso al bot para escribir en tu repo
      contents: write
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Ejecutar script de actualización
        env:
          # Si lo corres manual, el payload estará vacío, el script debe manejarlo
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: python .github/scripts/update_manager.py

      - name: Commitear y subir cambios
        run: |
          git config --global user.name "Bunker Admin Bot"
          git config --global user.email "jvargas@gitadmin.cl"
          # Evita errores si no hay cambios reales en los archivos
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "GitOps: Actualización automática desde Panel de Control" && git push)
