<!DOCTYPE html>
<!DOCTYPE html>
<html lang="es"> <head>
    <meta charset="utf-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" alt="{{ site.name }}" /></a>

          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav>
            <a href="{{ site.baseurl }}/estudios" class="nav-cta">Estudios</a>
            <a href="{{ site.baseurl }}/portafolio" class="nav-cta">Portafolio</a>
            <a href="{{ site.baseurl }}/about" class="nav-cta">Acerca de mi</a>
            <a href="{{ site.baseurl }}/mensaje" class="nav-cta">Enviar Mensaje</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
          <p style="font-size: 12px; color: #94a3b8; margin-top: 20px;">&copy; {{ site.time | date: '%Y' }} {{ site.name }}</p>
        </footer>
      </div>
    </div>

    {% include analytics.html %}
  </body>
</html>
